server {
    listen       80;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/manifest+json;

    # Assets con hash en el nombre -> caché agresiva e inmutable
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }

    # SPA: cualquier ruta cae en index.html (Angular router resuelve)
    location / {
        try_files  $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # --- Alternativa same-origin (sin CORS) -------------------------------
    # Si prefieres que el frontend y el backend compartan dominio, pon
    # apiUrl: '' en environment.prod.ts y descomenta estos bloques apuntando
    # a tu backend (reemplaza BACKEND_HOST:PUERTO):
    #
    # location /api/ {
    #     proxy_pass         http://BACKEND_HOST:8088;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }
    # location /uploads/ {
    #     proxy_pass         http://BACKEND_HOST:8088;
    #     proxy_set_header   Host $host;
    # }
    # ----------------------------------------------------------------------
}
