<a
  [routerLink]="['/album', album().id]"
  class="group flex flex-col gap-3 rounded-xl bg-surface-1/40 p-4 transition-base hover:bg-surface-2"
>
  <div class="relative aspect-square w-full overflow-hidden rounded-lg bg-surface-2">
    @if (album().cover; as cover) {
      <img
        [src]="cover"
        [alt]="album().title"
        loading="lazy"
        class="h-full w-full object-cover transition-base group-hover:scale-105"
      />
    } @else {
      <div class="flex h-full w-full items-center justify-center text-dim">
        <lucide-icon name="disc-3" class="h-12 w-12"></lucide-icon>
      </div>
    }
    <button
      type="button"
      (click)="$event.preventDefault(); $event.stopPropagation(); albumFav.toggle(album())"
      class="absolute right-2 top-2 flex h-8 w-8 items-center justify-center rounded-full bg-background/70 transition-base"
      [class]="
        albumFav.isFavorite(album().id)
          ? 'text-primary opacity-100'
          : 'text-foreground opacity-0 group-hover:opacity-100 hover:text-primary'
      "
      [attr.aria-label]="albumFav.isFavorite(album().id) ? 'Quitar de favoritos' : 'Guardar álbum'"
      [attr.aria-pressed]="albumFav.isFavorite(album().id)"
    >
      <lucide-icon
        name="heart"
        class="h-4 w-4"
        [class.fill-primary]="albumFav.isFavorite(album().id)"
      ></lucide-icon>
    </button>
  </div>
  <div class="min-w-0">
    <div class="truncate text-[14px] font-semibold text-foreground">{{ album().title }}</div>
    <div class="truncate text-[12px] text-soft">
      {{ album().artist }}@if (album().year) { · {{ album().year }}}
    </div>
  </div>
</a>
