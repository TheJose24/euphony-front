<div class="flex flex-wrap gap-3">
  @for (genre of genres(); track genre) {
    <button
      type="button"
      (click)="select.emit(genre)"
      class="rounded-full border px-5 py-2.5 text-[13px] font-medium transition-base"
      [class]="
        selected() === genre
          ? 'border-primary bg-primary text-primary-foreground'
          : 'border-divider text-soft hover:border-primary hover:text-foreground'
      "
    >
      {{ genre }}
    </button>
  }
</div>
