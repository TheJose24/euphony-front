<div role="tablist" class="flex items-center gap-8 border-b border-divider">
  @for (tab of tabs(); track tab) {
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="active() === tab"
      [attr.tabindex]="active() === tab ? 0 : -1"
      (click)="select.emit(tab)"
      (keydown)="onKeydown($event, $index)"
      class="relative -mb-px flex min-h-[44px] items-center pb-3 pt-3 text-[15px] font-semibold transition-base"
      [class]="active() === tab ? 'text-foreground' : 'text-soft hover:text-foreground'"
    >
      {{ tab }}
      @if (active() === tab) {
        <span class="absolute inset-x-0 -bottom-px h-[3px] rounded-full bg-primary"></span>
      }
    </button>
  }
</div>
