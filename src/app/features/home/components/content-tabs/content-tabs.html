<div class="flex items-center gap-8 border-b border-divider">
  @for (tab of tabs(); track tab) {
    <button
      type="button"
      (click)="select.emit(tab)"
      class="relative -mb-px pb-3 text-[15px] font-semibold transition-base"
      [class]="active() === tab ? 'text-foreground' : 'text-soft hover:text-foreground'"
    >
      {{ tab }}
      @if (active() === tab) {
        <span class="absolute inset-x-0 -bottom-px h-[3px] rounded-full bg-primary"></span>
      }
    </button>
  }
</div>
