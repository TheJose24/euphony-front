<div class="flex gap-5 overflow-x-auto pb-2 snap-x">
  @for (banner of features(); track banner.kind) {
    <a
      [routerLink]="banner.link"
      class="group relative flex min-h-[210px] flex-1 min-w-[300px] sm:min-w-[460px] snap-start items-center gap-5 overflow-hidden rounded-2xl p-6 transition-base"
      [class]="
        banner.featured
          ? 'bg-gradient-to-br from-surface-2 via-surface-2 to-surface-1 hover:from-surface-3'
          : 'bg-surface-1 hover:bg-surface-2'
      "
    >
      <div class="relative min-w-0 flex-1">
        <span class="text-[11px] font-bold uppercase tracking-[0.18em] text-soft">
          {{ banner.kind === 'album' ? 'Álbum' : 'Artista' }}
        </span>
        <h3 class="mt-2 truncate text-2xl font-extrabold leading-tight tracking-tight text-foreground">
          {{ banner.title }}
        </h3>
        <p class="mt-2 line-clamp-2 text-[14px] leading-relaxed text-soft">{{ banner.subtitle }}</p>
        <span
          class="mt-5 inline-flex items-center gap-2 rounded-xl px-5 py-2.5 text-[14px] font-semibold transition-base"
          [class]="
            banner.featured
              ? 'bg-primary text-primary-foreground shadow-glow group-hover:bg-primary-glow'
              : 'border border-divider bg-background text-foreground group-hover:border-primary group-hover:text-primary'
          "
        >
          {{ banner.cta }}
          @if (banner.icon) {
            <lucide-icon [name]="banner.icon" class="h-4 w-4"></lucide-icon>
          }
        </span>
      </div>

      <!-- Real artwork carries the banner; neutral placeholder when none. -->
      <div
        class="relative hidden h-[150px] w-[150px] shrink-0 overflow-hidden bg-surface-3 sm:block"
        [class]="banner.kind === 'artist' ? 'rounded-full' : 'rounded-xl'"
      >
        @if (banner.cover; as cover) {
          <img
            [src]="cover"
            [alt]="banner.title"
            width="150"
            height="150"
            class="h-full w-full object-cover transition-base group-hover:scale-105"
          />
        } @else {
          <div class="flex h-full w-full items-center justify-center text-dim">
            <lucide-icon
              [name]="banner.kind === 'artist' ? 'mic-2' : 'disc-3'"
              class="h-12 w-12"
              [strokeWidth]="1.25"
            ></lucide-icon>
          </div>
        }
      </div>
    </a>
  }
</div>
