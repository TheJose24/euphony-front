<div class="flex gap-5 overflow-x-auto pb-2 snap-x">
  @for (banner of banners; track banner.title) {
    <article
      class="relative flex min-h-[210px] flex-1 min-w-[460px] snap-start flex-col justify-center overflow-hidden rounded-2xl p-8"
      [class]="
        banner.featured
          ? 'bg-gradient-to-br from-surface-2 via-surface-2 to-surface-1'
          : 'bg-surface-1'
      "
    >
      <!-- Decorative iridescent blob (stand-in for the 3D artwork) -->
      <div
        class="pointer-events-none absolute -right-6 top-1/2 hidden h-44 w-44 -translate-y-1/2 rounded-full bg-gradient-to-br from-primary via-cyan-300 to-purple-500 opacity-80 blur-[1px] md:block"
      ></div>
      <div
        class="pointer-events-none absolute -right-2 top-1/2 hidden h-40 w-40 -translate-y-1/2 rounded-full bg-primary/30 blur-3xl md:block"
      ></div>

      <div class="relative max-w-[60%]">
        <h3 class="text-2xl font-extrabold leading-tight tracking-tight text-foreground">
          {{ banner.title }}
        </h3>
        <p class="mt-3 text-[14px] leading-relaxed text-soft">{{ banner.subtitle }}</p>
        <button
          type="button"
          class="mt-6 inline-flex items-center gap-2 rounded-xl px-6 py-3 text-[14px] font-semibold transition-base"
          [class]="
            banner.featured
              ? 'bg-primary text-primary-foreground hover:bg-primary-glow shadow-glow'
              : 'border border-divider bg-background text-foreground hover:border-primary hover:text-primary'
          "
        >
          {{ banner.cta }}
          @if (banner.icon) {
            <lucide-icon [name]="banner.icon" class="h-4 w-4 fill-current"></lucide-icon>
          }
        </button>
      </div>
    </article>
  }
</div>
