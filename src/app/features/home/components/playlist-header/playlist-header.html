<section class="animate-fade-in">
  <div class="flex flex-col gap-8 md:flex-row md:items-end">
    <!-- Cover -->
    <div
      class="relative h-[260px] w-[260px] md:h-[300px] md:w-[300px] shrink-0 overflow-hidden rounded-xl shadow-2xl shadow-black/60"
    >
      <img [src]="cover" alt="Chill Mix cover" width="300" height="300" class="h-full w-full object-cover" />
      <!-- Spotify-like dot -->
      <div class="absolute top-3 left-3 flex h-7 w-7 items-center justify-center rounded-full bg-black/60 backdrop-blur">
        <div class="h-3 w-3 rounded-full bg-dot-green"></div>
      </div>
      <!-- Dark gradient + title -->
      <div
        class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/85 via-black/40 to-transparent pt-16 pb-6 px-5"
      >
        <div class="text-white text-3xl font-extrabold tracking-tight drop-shadow">Chill Mix</div>
      </div>
      <!-- Yellow stripe -->
      <div class="absolute inset-x-0 bottom-0 h-2 bg-cover-yellow"></div>
    </div>

    <!-- Info -->
    <div class="flex-1 min-w-0">
      <div class="text-[12px] font-semibold tracking-[0.22em] text-soft">PUBLIC PLAYLIST</div>
      <h1 class="display-title mt-3 text-foreground">Chill Mix</h1>
      <p class="mt-5 text-[15px] text-foreground">
        <span class="font-medium">Julia Wolf, ayokay, Khalid</span>
        <span class="text-soft"> and more</span>
      </p>
      <p class="mt-1 text-[13px] text-soft">
        Made for <span class="font-semibold text-foreground">davedirect3</span> .
      </p>
    </div>
  </div>

  <!-- Actions -->
  <div class="mt-8 flex items-center gap-5">
    <button
      type="button"
      (click)="togglePlay.emit()"
      class="group flex h-16 w-16 items-center justify-center rounded-full bg-primary text-primary-foreground shadow-glow transition-base hover:scale-105 hover:bg-primary-glow"
      [attr.aria-label]="isPlaying() ? 'Pause' : 'Play'"
    >
      @if (isPlaying()) {
        <lucide-icon name="pause" class="h-6 w-6 fill-current"></lucide-icon>
      } @else {
        <lucide-icon name="play" class="h-6 w-6 fill-current ml-0.5"></lucide-icon>
      }
    </button>

    <button
      type="button"
      (click)="toggleFavorite.emit()"
      class="flex h-11 w-11 items-center justify-center rounded-full text-soft transition-base hover:text-primary"
      aria-label="Favorite"
    >
      @if (isFavorite()) {
        <lucide-icon name="heart" class="h-7 w-7 transition-base fill-primary text-primary" [strokeWidth]="1.75"></lucide-icon>
      } @else {
        <lucide-icon name="heart" class="h-7 w-7 transition-base" [strokeWidth]="1.75"></lucide-icon>
      }
    </button>

    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-full border border-divider text-soft transition-base hover:text-primary hover:border-primary"
    >
      <lucide-icon name="download" class="h-5 w-5" [strokeWidth]="1.75"></lucide-icon>
    </button>

    <button
      type="button"
      class="flex h-11 w-11 items-center justify-center rounded-full text-soft transition-base hover:text-foreground"
    >
      <lucide-icon name="more-horizontal" class="h-6 w-6"></lucide-icon>
    </button>
  </div>
</section>
