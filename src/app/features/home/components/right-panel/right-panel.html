<aside class="hidden xl:flex w-[290px] shrink-0 flex-col gap-6 border-l border-divider bg-surface-1/40 p-6 h-full overflow-y-auto">
  <div>
    <h3 class="px-2 text-[13px] font-bold uppercase tracking-[0.18em] text-foreground">Favorite Album</h3>

    @if (loading()) {
      <div class="mt-3 px-2 text-[13px] text-soft">Cargando…</div>
    } @else if (albums().length === 0) {
      <div class="mt-3 px-2 text-[13px] text-soft">Aún no tienes álbumes favoritos.</div>
    } @else {
      <div class="mt-3 space-y-1">
        @for (album of albums(); track album.id) {
          <a
            [routerLink]="['/album', album.id]"
            class="group flex w-full items-center gap-3 rounded-lg p-2 transition-base hover:bg-surface-2 hover:translate-x-1"
          >
            <img
              [src]="album.cover ?? 'assets/album1.jpg'"
              alt=""
              width="60"
              height="60"
              loading="lazy"
              class="h-[60px] w-[60px] rounded-lg object-cover shrink-0"
            />
            <div class="min-w-0 flex-1 text-left">
              <div class="truncate text-[14px] font-medium text-foreground">{{ album.title }}</div>
              <div class="truncate text-[12px] text-soft">{{ album.artist }}</div>
            </div>
            <lucide-icon
              name="chevron-right"
              class="h-4 w-4 shrink-0 text-dim transition-base group-hover:text-primary"
            ></lucide-icon>
          </a>
        }
      </div>
    }
  </div>

  <!-- Offline promo card -->
  <div
    class="mt-auto rounded-2xl bg-gradient-to-br from-primary-glow to-primary p-6 text-center text-primary-foreground"
  >
    <lucide-icon name="crown" class="mx-auto h-7 w-7 fill-current"></lucide-icon>
    <div class="mt-3 text-[20px] font-extrabold leading-tight">Listening to music offline</div>
    <p class="mt-2 text-[13px] leading-relaxed text-primary-foreground/80">
      Experience listening to music offline with the best quality
    </p>
    <button
      type="button"
      class="mt-5 w-full rounded-xl bg-background py-3 text-[14px] font-semibold text-primary transition-base hover:bg-surface-2"
    >
      Try for free
    </button>
  </div>
</aside>
