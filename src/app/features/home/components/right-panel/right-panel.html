<aside class="hidden xl:flex w-[290px] shrink-0 flex-col gap-8 border-l border-divider bg-surface-1/40 p-6 h-full">
  @for (section of sections; track section.title) {
    <div>
      <h3 class="px-2 text-[13px] font-bold uppercase tracking-[0.18em] text-foreground">{{ section.title }}</h3>
      <div class="mt-3 space-y-1">
        @for (item of section.items; track item.title) {
          <button
            type="button"
            class="group flex w-full items-center gap-3 rounded-lg p-2 transition-base hover:bg-surface-2 hover:translate-x-1"
          >
            <img
              [src]="item.cover"
              alt=""
              width="60"
              height="60"
              loading="lazy"
              class="h-[60px] w-[60px] rounded-lg object-cover shrink-0"
            />
            <div class="min-w-0 flex-1 text-left">
              <div class="truncate text-[14px] font-medium text-foreground">{{ item.title }}</div>
              <div class="truncate text-[12px] text-soft">{{ item.followers }}</div>
            </div>
            <lucide-icon
              name="chevron-right"
              class="h-4 w-4 shrink-0 text-dim transition-base group-hover:text-primary"
            ></lucide-icon>
          </button>
        }
      </div>
    </div>
  }
</aside>
