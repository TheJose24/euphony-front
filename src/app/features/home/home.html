<app-layout [(query)]="query">
  <div class="px-6 md:px-10 py-8">
    <app-playlist-header
      [isPlaying]="player.isPlaying()"
      [isFavorite]="player.isCurrentFavorite()"
      (togglePlay)="player.togglePlay()"
      (toggleFavorite)="player.toggleFavorite()"
    />
    @if (loading()) {
      <div class="mt-12 py-12 text-center text-sm text-soft">Cargando canciones…</div>
    } @else if (error()) {
      <div class="mt-12 py-12 text-center text-sm text-red-400">
        No se pudieron cargar las canciones: {{ error() }}
      </div>
    } @else {
      <app-track-table
        [tracks]="filtered()"
        [activeId]="player.current().id"
        [isPlaying]="player.isPlaying()"
        (select)="handleSelect($event)"
      />
    }
  </div>

  <app-right-panel appRight />
</app-layout>
