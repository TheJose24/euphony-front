<footer
  class="sticky bottom-0 z-player flex h-[72px] w-full items-center gap-3 border-t border-divider bg-surface-player px-4 md:h-[112px] md:gap-4 md:px-6"
>
  <!-- Mobile-only progress indicator along the top edge (full scrubber lives on /player). -->
  <div
    class="absolute inset-x-0 top-0 h-0.5 bg-primary md:hidden"
    [style.width.%]="player.progressPct()"
    aria-hidden="true"
  ></div>

  <!-- Left: track info — tappable to open the full player -->
  <div class="flex min-w-0 flex-1 items-center gap-3 md:w-[280px] md:flex-none md:shrink-0">
    <a
      routerLink="/player"
      class="flex min-w-0 flex-1 items-center gap-3"
      aria-label="Abrir reproductor"
    >
      <img
        [src]="player.current().cover"
        alt=""
        width="64"
        height="64"
        loading="lazy"
        class="h-12 w-12 shrink-0 rounded-md object-cover md:h-16 md:w-16"
      />
      <div class="min-w-0">
        <div class="truncate text-[14px] font-semibold text-foreground">{{ player.current().title }}</div>
        <div class="truncate text-[12px] text-soft">{{ player.current().artist }}</div>
      </div>
    </a>
    <button
      type="button"
      (click)="fav.toggle(player.current())"
      class="shrink-0 transition-base"
      [class]="fav.isLiked(player.current().id) ? 'text-dot-green' : 'text-soft hover:text-foreground'"
      [attr.aria-label]="fav.isLiked(player.current().id) ? 'Quitar de favoritos' : 'Añadir a favoritos'"
      [attr.aria-pressed]="fav.isLiked(player.current().id)"
    >
      @if (fav.isLiked(player.current().id)) {
        <lucide-icon name="heart" class="h-5 w-5 fill-dot-green"></lucide-icon>
      } @else {
        <lucide-icon name="heart" class="h-5 w-5"></lucide-icon>
      }
    </button>
  </div>

  <!-- Center: full controls (tablet/desktop only) -->
  <div class="hidden min-w-0 flex-1 flex-col items-center gap-2 md:flex">
    <div class="flex items-center gap-5">
      <button
        type="button"
        (click)="player.toggleShuffle()"
        class="relative transition-base"
        [class]="player.shuffle() ? 'text-primary' : 'text-soft hover:text-foreground'"
        [attr.aria-pressed]="player.shuffle()"
        aria-label="Aleatorio"
      >
        <lucide-icon name="shuffle" class="h-[18px] w-[18px]"></lucide-icon>
        @if (player.shuffle()) {
          <span
            class="absolute left-1/2 top-full mt-0.5 h-1 w-1 -translate-x-1/2 rounded-full bg-primary"
          ></span>
        }
      </button>
      <button
        type="button"
        (click)="player.previous()"
        class="text-soft hover:text-foreground transition-base"
        aria-label="Anterior"
      >
        <lucide-icon name="skip-back" class="h-5 w-5 fill-current"></lucide-icon>
      </button>
      <button
        type="button"
        (click)="player.togglePlay()"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-white text-black hover:scale-105 transition-base"
        [attr.aria-label]="
          player.isLoading() ? 'Cargando' : player.isPlaying() ? 'Pausar' : 'Reproducir'
        "
        [attr.aria-busy]="player.isLoading()"
      >
        @if (player.isLoading()) {
          <lucide-icon name="loader-circle" class="h-5 w-5 animate-spin" aria-hidden="true"></lucide-icon>
        } @else if (player.isPlaying()) {
          <lucide-icon name="pause" class="h-5 w-5 fill-current"></lucide-icon>
        } @else {
          <lucide-icon name="play" class="h-5 w-5 fill-current ml-0.5"></lucide-icon>
        }
      </button>
      <button
        type="button"
        (click)="player.next()"
        [disabled]="!player.hasNext()"
        class="text-soft transition-base hover:text-foreground disabled:cursor-default disabled:opacity-40 disabled:hover:text-soft"
        aria-label="Siguiente"
      >
        <lucide-icon name="skip-forward" class="h-5 w-5 fill-current"></lucide-icon>
      </button>
      <button
        type="button"
        (click)="player.cycleRepeat()"
        class="relative transition-base"
        [class]="player.repeat() !== 'off' ? 'text-primary' : 'text-soft hover:text-foreground'"
        [attr.aria-label]="
          player.repeat() === 'one'
            ? 'Repetir una'
            : player.repeat() === 'all'
              ? 'Repetir todo'
              : 'Repetir desactivado'
        "
      >
        <lucide-icon name="repeat" class="h-[18px] w-[18px]"></lucide-icon>
        @if (player.repeat() === 'one') {
          <span
            class="absolute -right-1 -top-1 flex h-3 w-3 items-center justify-center rounded-full bg-primary text-[8px] font-bold text-primary-foreground"
            >1</span
          >
        } @else if (player.repeat() === 'all') {
          <span
            class="absolute left-1/2 top-full mt-0.5 h-1 w-1 -translate-x-1/2 rounded-full bg-primary"
          ></span>
        }
      </button>
    </div>
    <div class="flex w-full max-w-[640px] items-center gap-3">
      <span class="text-[11px] text-soft tabular-nums w-10 text-right">{{ fmtTime(player.progress()) }}</span>
      <input
        type="range"
        class="player-seek flex-1"
        min="0"
        [max]="player.duration()"
        step="1"
        [value]="player.progress()"
        (input)="seek($event)"
        [style.--seek-pct]="player.progressPct() + '%'"
        aria-label="Progreso de la canción"
        [attr.aria-valuetext]="fmtTime(player.progress()) + ' de ' + fmtTime(player.duration())"
      />
      <span class="text-[11px] text-soft tabular-nums w-10">{{ fmtTime(player.duration()) }}</span>
    </div>
  </div>

  <!-- Mobile-only play/pause (full transport is one tap away on /player) -->
  <button
    type="button"
    (click)="player.togglePlay()"
    class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white text-black transition-base md:hidden"
    [attr.aria-label]="
      player.isLoading() ? 'Cargando' : player.isPlaying() ? 'Pausar' : 'Reproducir'
    "
    [attr.aria-busy]="player.isLoading()"
  >
    @if (player.isLoading()) {
      <lucide-icon name="loader-circle" class="h-5 w-5 animate-spin" aria-hidden="true"></lucide-icon>
    } @else if (player.isPlaying()) {
      <lucide-icon name="pause" class="h-5 w-5 fill-current"></lucide-icon>
    } @else {
      <lucide-icon name="play" class="ml-0.5 h-5 w-5 fill-current"></lucide-icon>
    }
  </button>

  <!-- Right: extras (desktop only) -->
  <div class="hidden md:flex items-center gap-3 w-[200px] justify-end shrink-0">
    <a
      routerLink="/player"
      class="text-soft hover:text-foreground transition-base"
      aria-label="Abrir reproductor y cola"
    >
      <lucide-icon name="list-music" class="h-[18px] w-[18px]"></lucide-icon>
    </a>
    <button type="button" class="text-soft hover:text-foreground transition-base">
      <lucide-icon name="monitor-speaker" class="h-[18px] w-[18px]"></lucide-icon>
    </button>
    <lucide-icon name="volume-2" class="h-[18px] w-[18px] text-soft"></lucide-icon>
    <div class="h-1 w-24 rounded-full bg-surface-3">
      <div class="h-full w-3/4 rounded-full bg-foreground"></div>
    </div>
  </div>
</footer>
