@if (to(); as link) {
  <a
    [routerLink]="link"
    routerLinkActive="!text-primary"
    [routerLinkActiveOptions]="{ exact: true }"
    class="group flex w-full items-center gap-3 rounded-md px-3 py-2.5 text-[15px] font-medium transition-base text-soft hover:text-foreground"
  >
    <lucide-icon [name]="icon()" class="h-[18px] w-[18px] transition-base" [strokeWidth]="1.75"></lucide-icon>
    <span>{{ label() }}</span>
  </a>
} @else {
  <button
    type="button"
    class="group flex w-full items-center gap-3 rounded-md px-3 py-2.5 text-[15px] font-medium transition-base text-soft hover:text-foreground"
  >
    <lucide-icon [name]="icon()" class="h-[18px] w-[18px] transition-base" [strokeWidth]="1.75"></lucide-icon>
    <span>{{ label() }}</span>
  </button>
}
