<div class="relative shrink-0">
  <button
    type="button"
    (click)="toggle()"
    [attr.aria-expanded]="open()"
    aria-haspopup="menu"
    [attr.aria-label]="'Cuenta de ' + (username() || 'usuario')"
    class="relative block rounded-full outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-background transition-base"
  >
    <div class="absolute -inset-1 rounded-full bg-primary/30 blur-md"></div>
    <img
      [src]="avatar()"
      alt=""
      width="54"
      height="54"
      loading="lazy"
      class="relative h-[54px] w-[54px] rounded-full object-cover ring-2 ring-primary"
    />
  </button>

  @if (open()) {
    <div
      role="menu"
      class="absolute right-0 top-[calc(100%+0.75rem)] z-50 w-56 overflow-hidden rounded-xl border border-divider/60 bg-background shadow-2xl animate-fade-in"
    >
      <div class="border-b border-divider/60 px-4 py-3">
        <p class="text-[11px] uppercase tracking-[0.16em] text-dim">Sesión iniciada como</p>
        <p class="mt-0.5 truncate text-[14px] font-semibold text-foreground">{{ username() || 'Usuario' }}</p>
      </div>
      <a
        routerLink="/profile"
        role="menuitem"
        (click)="open.set(false)"
        class="flex w-full items-center gap-3 px-4 py-3 text-left text-[14px] text-soft hover:bg-white/5 hover:text-foreground transition-base"
      >
        <lucide-icon name="user" class="h-[18px] w-[18px]"></lucide-icon>
        Ver perfil
      </a>
      <button
        type="button"
        role="menuitem"
        (click)="logout()"
        class="flex w-full items-center gap-3 border-t border-divider/60 px-4 py-3 text-left text-[14px] text-soft hover:bg-white/5 hover:text-foreground transition-base"
      >
        <lucide-icon name="log-out" class="h-[18px] w-[18px]"></lucide-icon>
        Cerrar sesión
      </button>
    </div>
  }
</div>
